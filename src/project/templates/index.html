{% load static %} <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Social Book - Home</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/uikit.css' %}">
</head>
<body>
    <img src="{% static 'images/logo.png' %}" alt="Logo">

    <a href="/profile">Chào mừng, {{user.username}}</a>
    
    </body>
<nav style="background: #1877f2; padding: 10px; color: white; display: flex; justify-content: space-between;">
    <div>
        <a href="/" style="color: white; text-decoration: none; font-weight: bold; font-size: 20px;">SocialBook</a>
    </div>
    <div>
        <a href="/profile" style="color: white; margin-right: 15px;">Trang cá nhân</a>
        <a href="/settings" style="color: white; margin-right: 15px;">Cài đặt</a>
        <a href="/logout" style="color: white;">Đăng xuất</a>
    </div>
</nav>
<form action="/upload" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <textarea name="caption" placeholder="Bạn đang nghĩ gì..."></textarea>
    <input type="file" name="image_upload">
    <button type="submit">Đăng bài</button>
</form>
{% for post in posts %}
    <div class="post-card" style="border: 1px solid #ddd; margin: 20px 0; padding: 15px; border-radius: 8px; background: white;">
        <strong>@{{ post.user }}</strong>
        <p>{{ post.caption }}</p>
        
        {% if post.image %}
            <img src="{{ post.image.url }}" style="width: 100%; max-width: 500px; border-radius: 8px; display: block; margin-top: 10px;">
        {% endif %}
        
        <br>
        <small style="color: gray;">Đăng vào: {{ post.created_at }}</small>
    </div>
{% endfor %}
</html>
